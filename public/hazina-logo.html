<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazina Logo Generator</title>
    <!-- Importing the exact font used in the Hazina Web App -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff; /* White background */
            font-family: 'Outfit', sans-serif;
        }

        .logo-container {
            text-align: center;
        }

        .logo-text {
            /* Tailwind red-600: #dc2626 */
            color: #dc2626;
            font-size: 15rem; /* Huge text! */
            font-weight: 800; /* Extra bold */
            letter-spacing: -0.05em; /* tracking-tight */
            margin: 0;
            line-height: 1;
        }

        .logo-dark {
            background-color: #000000;
        }

        .logo-dark .logo-text {
            color: #ef4444; /* Tailwind red-500 for better contrast on dark */
        }

        /* Controls for the user to tweak the view */
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: sans-serif;
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        
        button {
            padding: 8px 16px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #dc2626;
            color: white;
            font-weight: bold;
        }

        @media print {
            .controls { display: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h3>Logo Studio</h3>
        <p>Take a screenshot of the center to save your logo!</p>
        <button onclick="document.body.classList.toggle('logo-dark')">Toggle Dark/Light Mode</button>
    </div>

    <div class="logo-container">
        <h1 class="logo-text">Hazina</h1>
    </div>

</body>
</html>
